name: CI Quality Check

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  test:
    name: "Quality & Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies (OpenCV/MediaPipe)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libusb-1.0-0

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Configure Poetry Virtualenv
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry Dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Cache Pre-Commit Hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Verify Dependencies Consistency
        run: poetry check

      - name: Install Project Dependencies (inc. Dev)
        run: poetry install --with dev --no-interaction

      - name: Run Linters (Linting via Poetry)
        run: poetry run pre-commit run --all-files --show-diff-on-failure

      - name: Run Tests (Pytest via Poetry)
        run: poetry run pytest
